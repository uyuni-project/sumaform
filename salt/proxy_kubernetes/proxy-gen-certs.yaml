apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ ProxyName}}
  namespace: {{ Namespace }}
  labels:
    app.kubernetes.io/part-of: uyuni
spec:
  secretName: {{ ProxyName}}
  secretTemplate:
    labels:
      app.kubernetes.io/part-of: uyuni
  isCA: false
  usages:
  - server auth
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
    rotationPolicy: Always
  dnsNames:
    - {{ ProxyFQDN }}
  commonName: {{ ProxyFQDN }}
  issuerRef:
    name: "uyuni-issuer"
    kind: ClusterIssuer
    group: cert-manager.io
